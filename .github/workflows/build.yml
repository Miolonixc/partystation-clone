name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Set version
      run: |
        cd host-app/android/app
        BUILD_NUM=${{ github.run_number }}
        VERSION_CODE=$((BUILD_NUM + 10))
        sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" build.gradle
        VERSION_NAME="1.0.0.$VERSION_CODE"
        sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION_NAME\"/" build.gradle
        echo "VERSION=$VERSION_NAME" >> $GITHUB_ENV
        echo "Built version: $VERSION_NAME (code: $VERSION_CODE)"

    - name: Build player web app
      run: |
        cd player-app
        npm ci
        npm run build

    - name: Build host APK
      run: |
        cd host-app/android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PartyStation-${{ env.VERSION }}
        path: host-app/android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
